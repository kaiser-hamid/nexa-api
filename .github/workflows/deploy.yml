name: Deployment
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup php version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Remove lock file
        run: rm -f composer.lock
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Copy .env file
        run: cp .env.example .env
      - name: Generate key
        run: php artisan key:generate
      - name: Run tests
        run: php artisan test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup php version
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Remove lock file
        run: rm -f composer.lock
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader --no-dev
      - name: Compress release
        run: tar -czf /tmp/release.tar.gz --exclude=tests --exclude=.git --exclude=.github .
      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: /tmp/release.tar.gz
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: release
      - name: Copy release to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: release.tar.gz
          target: "~/tmp"
      - name: Deploying release on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            tar -xzf ~/tmp/release.tar.gz -C ~/nexa/release